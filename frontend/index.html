<html>
    <head>
    <title>Feedback Form</title>
    </head>
    <body>
    <input type="text" id="feed" placeholder="Enter">
    <button onclick="savefeedback()">Submit</button>
    <script>
        const API="https://shareproject.onrender.com"
        async function savefeedback() {
            const feedback=document.getElementById("feed").value;
        await fetch(API,{method:"POST", headers:{"content-Type":"application/json"},body:JSON.stringify({feedback})});
         alert("saved")
        }
    </script>
    </body>
</html>
